spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/velaris_db}
    username: ${SPRING_DATASOURCE_USERNAME:velaris}
    password: ${SPRING_DATASOURCE_PASSWORD:velaris123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:velaris@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:velaris-secret-key-hawaii-min-256-bits-long-enough-for-security}
  expiration: 86400000

ai:
  anthropic:
    api-key: ${GROQ_API_KEY:}
    max-tokens: 1024

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /api-docs

logging:
  level:
    com.velaris: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO