services:

  postgres:
    image: postgres:16-alpine
    container_name: velaris_postgres
    environment:
      POSTGRES_DB:       velaris_db
      POSTGRES_USER:     velaris
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velaris -d velaris_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velaris-net

  backend:
    build:
      context: ./velaris-backend
      dockerfile: Dockerfile
    container_name: velaris_backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/velaris_db
      SPRING_DATASOURCE_USERNAME: velaris
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:                 ${JWT_SECRET}
      MAIL_HOST:                  smtp.gmail.com
      MAIL_USERNAME:              ${MAIL_USERNAME}
      MAIL_PASSWORD:              ${MAIL_PASSWORD}
      GROQ_API_KEY:               ${GROQ_API_KEY}
      CORS_ALLOWED_ORIGINS:       http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    networks:
      - velaris-net

  frontend:
    build:
      context: ./velaris-frontend
      dockerfile: Dockerfile
    container_name: velaris_frontend
    restart: on-failure
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - velaris-net

networks:
  velaris-net:
    driver: bridge

volumes:
  postgres_data: